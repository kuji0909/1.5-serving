<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인생네컷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0ea;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }

  h1 {
    font-size: 2rem;
    color: #4a6741;
    margin-bottom: 6px;
    letter-spacing: 4px;
    font-weight: 300;
  }

  .subtitle {
    color: #8a9e85;
    font-size: 0.85rem;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }

  .main-area {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── 왼쪽: 카메라 ── */
  .camera-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .camera-wrapper {
    position: relative;
    width: 380px;
    height: 285px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    background: #222;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  .countdown-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    font-weight: bold;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.15);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
  }

  .shot-indicator {
    color: #4a6741;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }

  .buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  #captureBtn {
    background: #4a6741;
    color: white;
    box-shadow: 0 4px 12px rgba(74,103,65,0.35);
  }
  #captureBtn:hover:not(:disabled) { background: #3a5332; transform: translateY(-1px); }
  #captureBtn:disabled { background: #a0b89a; cursor: not-allowed; }

  #retakeBtn {
    background: white;
    color: #4a6741;
    border: 1.5px solid #4a6741;
    display: none;
  }
  #retakeBtn:hover { background: #f0f5ee; }

  #saveBtn {
    background: #c8a96e;
    color: white;
    box-shadow: 0 4px 12px rgba(200,169,110,0.35);
    display: none;
  }
  #saveBtn:hover { background: #b8965a; transform: translateY(-1px); }

  /* ── 오른쪽: 결과 프레임 ── */
  .result-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .strip-container {
    position: relative;
    width: 260px;
  }

  /* 프레임 배경 전체를 감싸는 박스 */
  .strip-frame {
    position: relative;
    background: white;
    border-radius: 8px;
    padding: 22px 18px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* 수채화 코너 장식 */
  .deco-corner {
    position: absolute;
    pointer-events: none;
  }
  .deco-corner.tl { top: -10px; left: -10px; width: 110px; }
  .deco-corner.br {
    bottom: -10px; right: -10px; width: 110px;
    transform: rotate(180deg);
  }

  /* 사이드 장식 */
  .deco-side {
    position: absolute;
    pointer-events: none;
  }
  .deco-side.left {
    left: -28px;
    top: 50%;
    transform: translateY(-50%) rotate(10deg);
    width: 42px;
    opacity: 0.75;
  }
  .deco-side.right {
    right: -26px;
    top: 30%;
    transform: translateY(-50%) rotate(-15deg) scaleX(-1);
    width: 38px;
    opacity: 0.7;
  }

  .photo-slot {
    width: 100%;
    aspect-ratio: 4/3;
    background: #e8e0d8;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  .photo-slot .slot-num {
    color: #bbb;
    font-size: 1.5rem;
    font-weight: 300;
  }

  .strip-bottom {
    text-align: center;
    padding-top: 4px;
    color: #8a9e85;
    font-size: 0.65rem;
    letter-spacing: 2px;
  }

  /* 스티커 (LEAF_24 배치) */
  .sticker-overlay {
    position: absolute;
    pointer-events: none;
    width: 55px;
    opacity: 0.85;
  }
  .sticker-overlay.s1 { bottom: 30px; right: -18px; transform: rotate(30deg); }
  .sticker-overlay.s2 { bottom: 100px; left: -20px; transform: rotate(-20deg) scaleX(-1); width: 48px; }

  @media (max-width: 700px) {
    .main-area { flex-direction: column; align-items: center; }
    .camera-wrapper { width: 320px; height: 240px; }
  }
</style>
</head>
<body>

<h1>인생네컷</h1>
<p class="subtitle">나만의 즉석사진</p>

<div class="main-area">

  <!-- 카메라 -->
  <div class="camera-section">
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline></video>
      <div class="countdown-overlay" id="countdown"></div>
      <div class="flash-overlay" id="flash"></div>
    </div>

    <div class="shot-indicator" id="shotIndicator">📷 촬영 준비 완료</div>

    <div class="buttons">
      <button id="captureBtn">사진 찍기</button>
      <button id="retakeBtn">다시 찍기</button>
      <button id="saveBtn">저장하기</button>
    </div>
  </div>

  <!-- 결과 스트립 -->
  <div class="result-section">
    <div class="strip-container">
      <div class="strip-frame" id="stripFrame">

        <!-- 코너 장식 (frame) -->
        <img class="deco-corner tl" id="decoTL" src="" alt="">
        <img class="deco-corner br" id="decoBR" src="" alt="">

        <!-- 사이드 장식 -->
        <img class="deco-side left" id="decoLeft" src="" alt="">
        <img class="deco-side right" id="decoRight" src="" alt="">

        <!-- 4개 슬롯 -->
        <div class="photo-slot" id="slot0"><span class="slot-num">1</span></div>
        <div class="photo-slot" id="slot1"><span class="slot-num">2</span></div>
        <div class="photo-slot" id="slot2"><span class="slot-num">3</span></div>
        <div class="photo-slot" id="slot3"><span class="slot-num">4</span></div>

        <!-- 스티커 -->
        <img class="sticker-overlay s1" id="stickerA" src="" alt="">
        <img class="sticker-overlay s2" id="stickerB" src="" alt="">

        <div class="strip-bottom">✦ moment ✦</div>
      </div>
    </div>
  </div>

</div>

document.getElementById('decoTL').src   = 'data:image/png;base64,' + FRAME04;
document.getElementById('decoBR').src   = 'data:image/png;base64,' + FRAME04;
document.getElementById('decoLeft').src = 'data:image/png;base64,' + LEAF41;
document.getElementById('decoRight').src= 'data:image/png;base64,' + LEAF8;
document.getElementById('stickerA').src = 'data:image/png;base64,' + LEAF24;
document.getElementById('stickerB').src = 'data:image/png;base64,' + LEAF24;

// ── 카메라 초기화 ──
const video = document.getElementById('video');
navigator.mediaDevices.getUserMedia({ video: { width:1280, height:720 }, audio: false })
  .then(stream => { video.srcObject = stream; })
  .catch(err => {
    document.getElementById('shotIndicator').textContent = '카메라를 찾을 수 없습니다';
    document.getElementById('captureBtn').disabled = true;
    console.error(err);
  });

// ── 상태 ──
let photos = [null, null, null, null];
let currentShot = 0;
let isShooting = false;

const captureBtn  = document.getElementById('captureBtn');
const retakeBtn   = document.getElementById('retakeBtn');
const saveBtn     = document.getElementById('saveBtn');
const countdown   = document.getElementById('countdown');
const flash       = document.getElementById('flash');
const indicator   = document.getElementById('shotIndicator');

function updateIndicator() {
  if (currentShot < 4) {
    indicator.textContent = `📷 ${currentShot + 1} / 4 번째 사진`;
  } else {
    indicator.textContent = '✅ 4장 완료! 저장하거나 다시 찍어보세요';
    saveBtn.style.display = 'inline-block';
    retakeBtn.style.display = 'inline-block';
    captureBtn.style.display = 'none';
  }
}

function setSlot(index, dataUrl) {
  const slot = document.getElementById('slot' + index);
  slot.innerHTML = '';
  const img = document.createElement('img');
  img.src = dataUrl;
  slot.appendChild(img);
}

async function runCountdown(seconds) {
  countdown.style.opacity = '1';
  for (let i = seconds; i >= 1; i--) {
    countdown.textContent = i;
    await delay(1000);
  }
  countdown.style.opacity = '0';
  countdown.textContent = '';
}

function doFlash() {
  flash.style.transition = 'none';
  flash.style.opacity = '0.9';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.4s ease';
    flash.style.opacity = '0';
  }, 80);
}

function captureFrame() {
  const canvas = document.getElementById('hiddenCanvas');
  canvas.width  = video.videoWidth  || 1280;
  canvas.height = video.videoHeight || 720;
  const ctx = canvas.getContext('2d');
  // mirror flip
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.92);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startShooting() {
  if (isShooting) return;
  isShooting = true;
  captureBtn.disabled = true;

  for (let i = currentShot; i < 4; i++) {
    indicator.textContent = `⏳ ${i + 1} / 4 준비 중...`;
    await runCountdown(3);
    doFlash();
    await delay(150);
    const dataUrl = captureFrame();
    photos[i] = dataUrl;
    setSlot(i, dataUrl);
    currentShot = i + 1;
    if (i < 3) await delay(800);
  }

  isShooting = false;
  updateIndicator();
}

captureBtn.addEventListener('click', startShooting);

retakeBtn.addEventListener('click', () => {
  photos = [null, null, null, null];
  currentShot = 0;
  for (let i = 0; i < 4; i++) {
    const slot = document.getElementById('slot' + i);
    slot.innerHTML = `<span class="slot-num">${i+1}</span>`;
  }
  saveBtn.style.display   = 'none';
  retakeBtn.style.display = 'none';
  captureBtn.style.display= 'inline-block';
  captureBtn.disabled     = false;
  indicator.textContent   = '📷 촬영 준비 완료';
});

// ── 저장 ──
saveBtn.addEventListener('click', async () => {
  saveBtn.textContent = '저장 중...';
  saveBtn.disabled = true;

  const frame = document.getElementById('stripFrame');
  // html2canvas 없이 직접 캔버스에 그리기
  await renderStrip();

  saveBtn.textContent = '저장하기';
  saveBtn.disabled = false;
});

async function loadImg(src) {
  return new Promise((res, rej) => {
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = src;
  });
}

async function renderStrip() {
  // 레이아웃 치수 (px)
  const W       = 520;
  const padX    = 36;
  const padTop  = 44;
  const padBot  = 56;
  const gap     = 16;
  const photoW  = W - padX * 2;
  const photoH  = Math.round(photoW * 3 / 4);  // 4:3
  const H = padTop + photoH * 4 + gap * 3 + padBot;

  const canvas = document.createElement('canvas');
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 배경
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  roundRect(ctx, 0, 0, W, H, 14);
  ctx.fill();

  // 사진 그리기
  for (let i = 0; i < 4; i++) {
    if (!photos[i]) continue;
    const x = padX;
    const y = padTop + i * (photoH + gap);
    const img = await loadImg(photos[i]);
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, x, y, photoW, photoH, 6);
    ctx.clip();
    ctx.drawImage(img, x, y, photoW, photoH);
    ctx.restore();
  }

  // 하단 텍스트
  ctx.fillStyle = '#8a9e85';
  ctx.font = '13px "Apple SD Gothic Neo", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('✦  moment  ✦', W / 2, H - 18);

  // 코너 장식
  try {
    const c04 = await loadImg('data:image/png;base64,' + FRAME04);
    const dSize = 160;
    ctx.drawImage(c04, -16, -16, dSize, dSize);
    ctx.save();
    ctx.translate(W + 16, H + 16);
    ctx.rotate(Math.PI);
    ctx.drawImage(c04, 0, 0, dSize, dSize);
    ctx.restore();
  } catch(e) {}

  // 사이드 장식
  try {
    const lf41 = await loadImg('data:image/png;base64,' + LEAF41);
    const lH = 200;
    const lW = Math.round(lf41.width / lf41.height * lH);
    ctx.save();
    ctx.globalAlpha = 0.75;
    ctx.translate(-16, H/2 - lH/2);
    ctx.rotate(0.17);
    ctx.drawImage(lf41, 0, 0, lW, lH);
    ctx.restore();

    const lf8 = await loadImg('data:image/png;base64,' + LEAF8);
    const lH2 = 180;
    const lW2 = Math.round(lf8.width / lf8.height * lH2);
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.translate(W - 8, H * 0.28);
    ctx.scale(-1, 1);
    ctx.rotate(-0.26);
    ctx.drawImage(lf8, 0, 0, lW2, lH2);
    ctx.restore();
  } catch(e) {}

  // 스티커 (LEAF_24)
  try {
    const stk = await loadImg('data:image/png;base64,' + LEAF24);
    const sW = 90, sH = Math.round(stk.height / stk.width * sW);
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.translate(W - 10, H - 80);
    ctx.rotate(0.52);
    ctx.drawImage(stk, 0, 0, sW, sH);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.translate(4, H - 130);
    ctx.scale(-1, 1);
    ctx.rotate(-0.35);
    ctx.drawImage(stk, 0, 0, 80, Math.round(stk.height / stk.width * 80));
    ctx.restore();
  } catch(e) {}

  // 다운로드
  const link = document.createElement('a');
  link.download = `인생네컷_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
</script>
